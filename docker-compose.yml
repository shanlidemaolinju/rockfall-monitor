# 落石监测系统 — Docker 一键部署
# 启动: docker-compose up -d
# 停止: docker-compose down
# 日志: docker-compose logs -f

version: "3.8"

services:
  rockfall:
    build: .
    container_name: rockfall
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据 (预警记录/截图/日志)
      - ./data:/app/data
      # 模型文件 (大文件挂载, 避免每次重建镜像)
      - ./models:/app/models:ro
      - ./FastSAM-x.pt:/app/FastSAM-x.pt:ro
    env_file:
      - .env
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # GPU 支持 (需要 nvidia-container-toolkit)
