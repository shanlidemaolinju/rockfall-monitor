# ============================================================
# RockGuard · Nginx 生产配置
# ============================================================
# 功能:
#   1. 反向代理 FastAPI 后端
#   2. API 限流 (10 req/s, burst 20)
#   3. SSE/MJPEG 长连接流支持
#   4. 安全头 + Gzip
#   5. /results/ 静态资源托管
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    # ── 基础配置 ──
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── 限流区域 (10 req/s, burst 20) ──
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── 上游 ──
    upstream rockfall_backend {
        server rockfall_api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 500M;
        client_body_timeout 300s;

        # ── 安全头 ──
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        # HTTPS 部署时取消注释:
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ── 静态资源 (/results/) ──
        location /results/ {
            alias /results/;
            autoindex on;
            expires 1h;
            add_header Cache-Control "public";
        }

        # ── MJPEG 视频流 (禁用缓冲) ──
        location /api/stream.mjpeg {
            proxy_pass http://rockfall_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── SSE 预警实时推送 (禁用缓冲) ──
        location /api/alerts/stream {
            proxy_pass http://rockfall_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding on;
        }

        # ── API 限流 ──
        location /api/ {
            proxy_pass http://rockfall_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
        }

        # ── 主应用 (WebSocket 升级支持) ──
        location / {
            proxy_pass http://rockfall_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
