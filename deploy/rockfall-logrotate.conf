# ============================================================
# 落石检测系统 — Logrotate 日志轮转配置
# ============================================================
# 安装:
#   sudo cp deploy/rockfall-logrotate.conf /etc/logrotate.d/rockfall
#
# 测试语法:
#   sudo logrotate -d /etc/logrotate.d/rockfall
#
# 强制执行一次:
#   sudo logrotate -f /etc/logrotate.d/rockfall
# ============================================================

/opt/rockfall/data/detection_log.jsonl
/opt/rockfall/data/detection_log.*.jsonl
/opt/rockfall/data/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxage 30
}
