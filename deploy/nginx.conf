# 落石监测系统 — Nginx 反向代理配置
# 放置: /etc/nginx/sites-available/rockfall
# 启用: ln -s /etc/nginx/sites-available/rockfall /etc/nginx/sites-enabled/

upstream rockfall_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL (使用 certbot 自动管理)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 客户端上传限制
    client_max_body_size 500M;
    client_body_timeout 300s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 主应用
    location / {
        proxy_pass http://rockfall_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接超时 (SSE/MJPEG)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # MJPEG 视频流 — 禁用缓冲
    location /api/stream.mjpeg {
        proxy_pass http://rockfall_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # SSE 预警推送 — 禁用缓冲
    location /api/alerts/stream {
        proxy_pass http://rockfall_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # API 限流
    location /api/ {
        proxy_pass http://rockfall_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 每秒 10 请求, 突发 20
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
    }

    # 静态资源缓存
    location /static/ {
        proxy_pass http://rockfall_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# 限流区域定义 (放在 http 块中)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
