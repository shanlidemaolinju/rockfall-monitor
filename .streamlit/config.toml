# Streamlit Cloud 部署配置
# 文档: https://docs.streamlit.io/develop/api-reference/configuration

[theme]
primaryColor = "#dc3545"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor = "#212529"
font = "sans serif"

[server]
# Streamlit Cloud 自动注入 PORT 环境变量
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 500  # 最大上传文件 500MB (视频)

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[logger]
level = "info"
